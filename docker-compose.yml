services:
  storefront-analyzer:
    image: iaanalyzer
    container_name: iaanalyzer
    ports:
      - "9019:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_PATH=/data/storefront_analyzer.db
    volumes:
      - ./volumes/uploads:/app/uploads
      - ./volumes/data:/data
      - ./reference_guidelines:/app/reference_guidelines
    restart: unless-stopped
